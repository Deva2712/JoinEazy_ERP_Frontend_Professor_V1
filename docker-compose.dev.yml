services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    networks:
      - app-network
    environment:
      - WATCHPACK_POLLING=true
      - MODE=${MODE}
    volumes:
      - /app/node_modules
      - .:/app
      - ./logs/frontend:/app/logs
    stdin_open: true

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile.dev
    ports:
      - "0.0.0.0:${NGINX_PORT}:80"
      - "0.0.0.0:${NGINX_SSL_PORT}:443"
    networks:
      - app-network
    environment:
      - NGINX_PORT=${NGINX_PORT}
      - NGINX_SSL_PORT=${NGINX_SSL_PORT}
      - SERVER_NAME=${SERVER_NAME}
      - SERVER_ENV=${SERVER_ENV}
      - BACKEND_APP_API_URL=${BACKEND_APP_API_URL}
    volumes:
      - ./logs/nginx:/var/log/nginx
      - ${SSL_LOCATION}:/etc/nginx/certs:ro
    depends_on:
      - backend

networks:
  app-network:
    driver: bridge